
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso ISO 9001</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; max-width: 800px; margin:auto; }
h2 { color:#AA2131; }
.slide { display:none; }
.active { display:block; }

button {
 background:#AA2131;
 color:white;
 border:none;
 padding:10px;
 border-radius:6px;
 cursor:pointer;
}

input, select{width:100%;margin:5px 0;padding:8px;}

.buttons {
 display:flex;
 justify-content:space-between;
 margin-top:20px;
}

.progress{height:8px;background:#eee;margin-bottom:10px;}
.bar{height:8px;background:#AA2131;width:0%;}

#popup {
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.5);
 justify-content:center;
 align-items:center;
}

#popup div{
 background:white;
 padding:20px;
 border-radius:10px;
 text-align:center;
 animation:pop .3s;
}

@keyframes pop{
 from{transform:scale(.6);}
 to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="progress"><div id="bar" class="bar"></div></div>

<!-- REGISTRO -->
<div class="slide active">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre completo">
<select id="tipo">
<option>Cédula de ciudadanía</option>
<option>Cédula de extranjería</option>
<option>Tarjeta de identidad</option>
<option>Pasaporte</option>
</select>
<input id="doc" placeholder="Número documento">
<input id="correo" placeholder="Correo uninorte">
</div>

<!-- CONTENIDO -->
<div class="slide"><h2>Introducción</h2><p>Curso basado en PHVA.</p></div>

<div class="slide"><h2>Planear</h2><p>Cláusulas 4,5,6</p></div>
<div class="slide"><h2>Hacer</h2><p>Cláusulas 7,8</p></div>
<div class="slide"><h2>Verificar</h2><p>Cláusula 9</p></div>
<div class="slide"><h2>Actuar</h2><p>Cláusula 10</p></div>

<!-- QUIZ -->
<div class="slide">
<h2>Evaluación</h2>
<div id="quiz"></div>
<button onclick="calcular()">Finalizar evaluación</button>
<p id="resultado"></p>
</div>

<!-- DASHBOARD -->
<div class="slide">
<h2>Resultado</h2>
<p id="final"></p>
<button id="btnCert" style="display:none" onclick="generarPDF()">Descargar certificado</button>
</div>

<!-- POPUP -->
<div id="popup">
<div>
<h2>🎉 ¡Aprobaste!</h2>
<p>¡Excelente desempeño!</p>
<button onclick="cerrar()">Continuar</button>
</div>
</div>

<div class="buttons">
<button onclick="prev()">Anterior</button>
<button onclick="next()">Siguiente</button>
</div>

<script>
let i=0;
const slides=document.querySelectorAll(".slide");

function show(){
 slides.forEach(s=>s.classList.remove("active"));
 slides[i].classList.add("active");
 document.getElementById("bar").style.width=((i+1)/slides.length*100)+"%";
}
function next(){ if(i<slides.length-1){i++;show();}}
function prev(){ if(i>0){i--;show();}}
show();

/* QUIZ */
const preguntas=[
"PHVA significa",
"Cláusula 4",
"Cláusula 5",
"Riesgos",
"Recursos",
"Cláusula 8",
"Auditorías",
"Mejora continua",
"Cliente",
"Objetivo ISO"
];

const quiz=document.getElementById("quiz");

preguntas.forEach((p,i)=>{
 quiz.innerHTML+=`
 <p>${i+1}. ${p}<br>
 <input type="radio" name="q${i}" value="1">Correcta<br>
 <input type="radio" name="q${i}" value="0">Incorrecta</p>`;
});

let score=0;

function calcular(){
 score=0;

 for(let i=0;i<10;i++){
  let r=document.querySelector('input[name="q'+i+'"]:checked');
  if(r) score+=parseInt(r.value);
 }

 document.getElementById("resultado").innerText="Puntaje: "+score+"/10";

 if(score>=8){
  document.getElementById("popup").style.display="flex";
 } else{
  alert("Debes aprobar con mínimo 8/10");
 }
}

function cerrar(){
 document.getElementById("popup").style.display="none";
 document.getElementById("final").innerText="Aprobado con "+score+"/10 ✅";
 document.getElementById("btnCert").style.display="block";
 next();
}

/* CERTIFICADO PDF */
function generarPDF(){

 if(score<8){
  alert("Debes aprobar primero");
  return;
 }

 const {jsPDF}=window.jspdf;
 const docPDF=new jsPDF();

 let nombre=document.getElementById("nombre").value;
 let documento=document.getElementById("doc").value;
 let fecha=new Date().toLocaleDateString();

 docPDF.setFontSize(14);
 docPDF.text("Fundamentos para entender la ISO 9001:2015",20,20);

 docPDF.setFontSize(11);
 docPDF.text("Certificado autogenerado por el usuario que permite hacer constar que realizó el curso virtual",20,40);

 docPDF.text("Nombre: "+nombre,20,60);
 docPDF.text("Identificación: "+documento,20,70);
 docPDF.text("Fecha: "+fecha,20,80);

 docPDF.save("certificado_ISO9001.pdf");
}
</script>

</body>
</html>
